site_name: VCM-704LAB-UET
site_description: Video Coding for Machine Vision Research Group at UET-VNU
site_author: VCM-704LAB-UET
site_url: https://vcm-704lab-uet.github.io/lab-website/

repo_name: VCM-704LAB-UET/lab-website
repo_url: https://github.com/VCM-704LAB-UET/lab-website
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/images/logo-placeholder.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - About: about.md
  - People: people.md
  - Research: research.md
  - Projects: projects.md
  - Publications: publications.md
  - Resources: resources.md
  - Join Us: join-us.md
  - Contact: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VCM-704LAB-UET
      name: VCM-704LAB-UET on GitHub

copyright: Copyright &copy; 2026 VCM-704LAB-UET
