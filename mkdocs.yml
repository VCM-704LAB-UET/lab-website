site_name: VCM-704LAB-UET
site_description: Video Coding for Machines Research Group at UET-VNU
site_author: VCM-704LAB-UET
site_url: https://vcm-704lab-uet.github.io/lab-website/

repo_name: VCM-704LAB-UET/lab-website
repo_url: https://github.com/VCM-704LAB-UET/lab-website
edit_uri: edit/main/docs/

theme:
  name: material
  language: vi
  logo: assets/images/logo-placeholder.svg
  favicon: assets/images/favicon.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Chuyển sang giao diện tối
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Chuyển sang giao diện sáng
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

nav:
  - Trang chủ: index.md
  - Giới thiệu: about.md
  - Thành viên: people.md
  - Hướng nghiên cứu: research.md
  - Dự án: projects.md
  - Công bố: publications.md
  - Tài nguyên: resources.md
  - Tham gia nhóm: join-us.md
  - Liên hệ: contact.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VCM-704LAB-UET
      name: VCM-704LAB-UET trên GitHub

copyright: Copyright &copy; 2026 VCM-704LAB-UET